name: Deploy to Vercel

# Triggers: push to main that touches solutions/ or the website/ source
on:
  push:
    branches: [main]
    paths:
      - "solutions/**"
      - "website/**"
  workflow_dispatch: # allow one-click manual trigger from GitHub Actions tab

concurrency:
  group: "vercel-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Pull Vercel project settings (creates .vercel/project.json)
      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: website

      # Build the Next.js app via Vercel's own build pipeline
      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: website

      # Deploy the prebuilt output to Vercel
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: website
